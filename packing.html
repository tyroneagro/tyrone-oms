    <div id="toast" class="toast"></div>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBowsklKCH-C5uVv1laoqE9joupuGeqVdk",
            authDomain: "tyrone-oms.firebaseapp.com",
            projectId: "tyrone-oms",
            storageBucket: "tyrone-oms.firebasestorage.app",
            messagingSenderId: "494239566320",
            appId: "1:494239566320:web:9f44f2da4c8f00f7e9b535"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const COLLECTIONS = {
            CUSTOMERS: 'customers',
            TECHNICALS: 'technicals',
            ORDERS: 'orders',
            PACKING: 'packing',
            BULK_INVENTORY: 'bulk_inventory',
            BULK_USAGE: 'bulk_usage',
            FINISHED_GOODS: 'finished_goods'
        };
        
        let selectedOrder = null;
        let customers = [];
        let technicals = [];
        let bulkInventory = [];
        let selectedBatch = null;
        let allPackings = [];
        let currentUser = null;
        
        // ==================== UTILITY FUNCTIONS ====================
        
        function getCurrentUser() {
            try {
                return JSON.parse(localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser'));
            } catch (e) {
                return null;
            }
        }

        function isAdmin() {
            return currentUser && (currentUser.role === 'admin' || currentUser.role === 'Admin');
        }

        function canEdit() {
            const user = getCurrentUser();
            // Viewers cannot edit, all other roles can
            return user && user.role !== 'viewer';
        }

        function isViewer() {
            const user = getCurrentUser();
            return user && user.role === 'viewer';
        }

        function logout() {
            localStorage.removeItem('currentUser');
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.textContent = message;
                toast.className = `toast ${type}`;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        }

        function updateNavigation() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;

            const navItems = [
                { permission: 'canViewDashboard', url: 'dashboard.html', text: 'Dashboard' },
                { permission: 'canAccessMasterData', url: 'master-data.html', text: 'Master Data' },
                { permission: 'canAccessBottleInventory', url: 'bottle-inventory.html', text: 'Bottle Inventory' },
                { permission: 'canCreateOrder', url: 'create-order.html', text: 'Create Order' },
                { permission: 'canAccessPacking', url: 'packing.html', text: 'Packing' },
                { permission: 'canAccessBulkInventory', url: 'bulk-inventory.html', text: 'Bulk Inventory' },
                { permission: 'canAccessFinishedGoods', url: 'finished-goods-inventory.html', text: 'Finished Goods' },
                { permission: 'canAccessDispatch', url: 'dispatch.html', text: 'Dispatch' },
                { permission: 'canViewOrders', url: 'orders.html', text: 'Orders' },
                { permission: 'canAccessFormulation', url: 'formulation.html', text: 'Formulation' },
                { permission: 'canAccessFormulationInventory', url: 'formulation-inventory.html', text: 'Formulation Inventory' },
                { permission: 'canAccessReports', url: 'reports.html', text: 'Reports' }
            ];

            const navContainer = document.getElementById('navLinks');
            if (!navContainer) return;

            navContainer.innerHTML = '';

            navItems.forEach(item => {
                // Admin can see everything
                if (user.role === 'admin') {
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.className = 'nav-item';
                    link.textContent = item.text;
                    
                    const currentPage = window.location.pathname.split('/').pop();
                    if (currentPage === item.url) {
                        link.classList.add('active');
                    }
                    
                    navContainer.appendChild(link);
                }
                // Viewers can see all pages
                else if (user.role === 'viewer') {
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.className = 'nav-item';
                    link.textContent = item.text;
                    
                    const currentPage = window.location.pathname.split('/').pop();
                    if (currentPage === item.url) {
                        link.classList.add('active');
                    }
                    
                    navContainer.appendChild(link);
                }
                // Regular users see based on permissions
                else if (user.permissions && user.permissions[item.permission]) {
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.className = 'nav-item';
                    link.textContent = item.text;
                    
                    const currentPage = window.location.pathname.split('/').pop();
                    if (currentPage === item.url) {
                        link.classList.add('active');
                    }
                    
                    navContainer.appendChild(link);
                }
            });

            updateUserInfo(user);
        }

        function updateUserInfo(user) {
            const userNameEl = document.getElementById('userName');
            const userRoleEl = document.getElementById('userRole');
            const userAvatarEl = document.getElementById('userAvatar');
            
            if (userNameEl) userNameEl.textContent = user.name || 'User';
            if (userRoleEl) userRoleEl.textContent = (user.role || 'user').replace('_', ' ').toUpperCase();
            if (userAvatarEl) userAvatarEl.textContent = (user.name || 'U').charAt(0).toUpperCase();
        }

        function checkPageAccess() {
            const user = getCurrentUser();
            
            if (!user) {
                window.location.href = 'index.html';
                return false;
            }
            
            const pagePermissions = {
                'master-data.html': 'canAccessMasterData',
                'bottle-inventory.html': 'canAccessBottleInventory',
                'create-order.html': 'canCreateOrder',
                'packing.html': 'canAccessPacking',
                'bulk-inventory.html': 'canAccessBulkInventory',
                'finished-goods-inventory.html': 'canAccessFinishedGoods',
                'dispatch.html': 'canAccessDispatch',
                'orders.html': 'canViewOrders',
                'formulation.html': 'canAccessFormulation',
                'formulation-inventory.html': 'canAccessFormulationInventory',
                'reports.html': 'canAccessReports'
            };
            
            const currentPage = window.location.pathname.split('/').pop();
            const requiredPermission = pagePermissions[currentPage];
            
            // Viewers can access all pages
            if (user.role === 'viewer') {
                return true;
            }
            
            if (requiredPermission && (!user.permissions || !user.permissions[requiredPermission])) {
                window.location.href = 'dashboard.html';
                showToast('You do not have permission to access this page', 'error');
                return false;
            }
            
            return true;
        }

        // ==================== ORDER LOCK FUNCTIONS ====================
        
        async function toggleOrderLock(orderId, currentLockStatus) {
            if (!isAdmin()) {
                showToast('Only Admin can lock/unlock orders', 'error');
                return false;
            }
            
            try {
                const newLockStatus = !currentLockStatus;
                const orderRef = db.collection(COLLECTIONS.ORDERS).doc(orderId);
                
                await orderRef.update({
                    isLocked: newLockStatus,
                    lockedBy: newLockStatus ? currentUser?.name || 'Admin' : null,
                    lockedAt: newLockStatus ? new Date().toISOString() : null,
                    unlockedAt: !newLockStatus ? new Date().toISOString() : null
                });
                
                showToast(
                    newLockStatus ? '🔒 Order locked successfully' : '🔓 Order unlocked successfully',
                    newLockStatus ? 'info' : 'success'
                );
                
                // Refresh data
                await loadData();
                
                // If modal is open with this order, refresh it
                if (selectedOrder && selectedOrder.id === orderId) {
                    selectedOrder.isLocked = newLockStatus;
                    const orderPackings = allPackings.filter(p => p.order_id === selectedOrder.id);
                    await renderOrderDetails(selectedOrder, orderPackings);
                }
                
                return true;
            } catch (error) {
                console.error("Error toggling order lock:", error);
                showToast('Error updating order lock', 'error');
                return false;
            }
        }

        // ==================== SIZE CONVERSION ====================
        
        function convertSizeToML(sizeString) {
            if (!sizeString) return 0;
            
            const size = sizeString.toString().trim().toUpperCase();
            
            if (size.includes('LTR') || size.includes('LITRE') || size.includes(' L') || size === '1L') {
                const match = size.match(/(\d+(?:\.\d+)?)/);
                if (match) {
                    return parseFloat(match[1]) * 1000;
                }
                return 1000;
            }
            
            if (size.includes('ML')) {
                const match = size.match(/(\d+(?:\.\d+)?)/);
                if (match) {
                    return parseFloat(match[1]);
                }
            }
            
            const numericValue = parseFloat(size);
            if (!isNaN(numericValue)) {
                return numericValue;
            }
            
            return 0;
        }

        function convertSizeToLiters(sizeString) {
            if (!sizeString) return 0;
            const sizeML = convertSizeToML(sizeString);
            return sizeML / 1000;
        }

        // ==================== ADD TO FINISHED GOODS ====================
        
        async function addToFinishedGoods(batchData, line, boxesToPack, stockUsed, order, isExtra) {
            try {
                const finishedGood = {
                    brandName: line.brand_name || 'N/A',
                    technicalName: line.technical_name,
                    size: line.size,
                    pcsPerBox: line.pcs_per_box || 1,
                    batchNumber: batchData.batchNumber,
                    mfgDate: batchData.mfgDate,
                    expDate: batchData.expDate,
                    quantity: boxesToPack,
                    usedQuantity: 0,
                    usedInOrders: [],
                    sourceOrderId: order.id,
                    sourceOrderNumber: order.order_number,
                    sourceBatchId: batchData.id,
                    isExtra: true,
                    remarks: `Extra boxes packed from batch ${batchData.batchNumber}`,
                    addedAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };

                const existingSnapshot = await db.collection(COLLECTIONS.FINISHED_GOODS)
                    .where('batchNumber', '==', batchData.batchNumber)
                    .where('technicalName', '==', line.technical_name)
                    .where('size', '==', line.size)
                    .get();

                if (!existingSnapshot.empty) {
                    const existingDoc = existingSnapshot.docs[0];
                    const existingData = existingDoc.data();
                    const newQuantity = (existingData.quantity || 0) + boxesToPack;
                    
                    await existingDoc.ref.update({
                        quantity: newQuantity,
                        updatedAt: new Date().toISOString(),
                        remarks: `Added ${boxesToPack} extra boxes on ${new Date().toLocaleDateString()}`
                    });
                    
                    console.log(`Updated finished goods: +${boxesToPack} boxes`);
                } else {
                    await db.collection(COLLECTIONS.FINISHED_GOODS).add(finishedGood);
                    console.log(`Created new finished goods entry: ${boxesToPack} boxes`);
                }
            } catch (error) {
                console.error("Error adding to finished goods:", error);
                throw error;
            }
        }

        // ==================== LOAD DATA ====================
        
        async function loadBulkInventory() {
            try {
                const snapshot = await db.collection(COLLECTIONS.BULK_INVENTORY)
                    .where('quantity', '>', 0)
                    .get();
                
                bulkInventory = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                const totalStock = bulkInventory.reduce((sum, item) => sum + (item.quantity || 0), 0);
                document.getElementById('totalBulkStock').textContent = totalStock.toFixed(2);
                document.getElementById('activeBatches').textContent = bulkInventory.length;
                
            } catch (error) {
                console.error("Error loading bulk inventory:", error);
                bulkInventory = [];
            }
        }
        
        async function loadData() {
            try {
                await loadBulkInventory();
                
                const [ordersSnap, customersSnap, technicalsSnap, packingsSnap] = await Promise.all([
                    db.collection(COLLECTIONS.ORDERS).get(),
                    db.collection(COLLECTIONS.CUSTOMERS).get(),
                    db.collection(COLLECTIONS.TECHNICALS).get(),
                    db.collection(COLLECTIONS.PACKING).get()
                ]);
                
                customers = customersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                technicals = technicalsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                allPackings = packingsSnap.docs.map(doc => doc.data());
                
                // Calculate today's packed boxes (all packing, including extras)
                const today = new Date().toISOString().split('T')[0];
                const todayPacked = allPackings
                    .filter(p => p.packed_date === today)
                    .reduce((sum, p) => sum + (p.packed_boxes || 0), 0);
                document.getElementById('todayPacked').textContent = todayPacked;
                
                let orders = ordersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                orders = orders.map(order => {
                    const orderPackings = allPackings.filter(p => p.order_id === order.id);
                    
                    // Separate order boxes (for fulfilling order) and extra boxes
                    let orderBoxes = 0; // Boxes that count toward order fulfillment
                    let extraBoxes = 0; // Extra boxes that go to finished goods
                    
                    orderPackings.forEach(p => {
                        if (p.type === 'extra' || p.moved_to_finished_goods) {
                            extraBoxes += p.packed_boxes || 0;
                        } else {
                            orderBoxes += p.packed_boxes || 0;
                        }
                    });
                    
                    let totalOrderBoxes = 0;
                    if (order.lines && Array.isArray(order.lines)) {
                        totalOrderBoxes = order.lines.reduce((sum, line) => sum + (line.boxes || line.qty || 0), 0);
                    }
                    
                    // Progress based ONLY on order boxes, NOT extra boxes
                    const progress = totalOrderBoxes > 0 ? (orderBoxes / totalOrderBoxes) * 100 : 0;
                    
                    // Order is complete ONLY if orderBoxes >= totalOrderBoxes
                    const isFullyPacked = orderBoxes >= totalOrderBoxes && totalOrderBoxes > 0;
                    
                    return { 
                        ...order, 
                        orderBoxes,      // Boxes that fulfill the order
                        extraBoxes,      // Extra boxes made
                        totalBoxes: totalOrderBoxes,
                        progress,
                        isFullyPacked,
                        isLocked: order.isLocked || false
                    };
                });
                
                // Show all orders that are not fully packed OR have available stock
                const pendingOrders = orders.filter(order => {
                    const hasAvailableStock = order.lines?.some(line => {
                        const stockAvailable = bulkInventory.some(item => 
                            item.technicalName === line.technical_name && item.quantity > 0
                        );
                        return stockAvailable;
                    });
                    
                    // Show if not fully packed OR has stock available for extra packing
                    return (!order.isFullyPacked || hasAvailableStock) && order.totalBoxes > 0;
                });
                
                renderOrdersGrid(pendingOrders);
                
                document.getElementById('pendingOrdersCount').textContent = pendingOrders.length;
                
            } catch (error) {
                console.error("Error loading data:", error);
                showToast("Error loading data", "error");
            }
        }
        
        function renderOrdersGrid(orders) {
            const container = document.getElementById('ordersGrid');
            if (!container) return;
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; background: white; border-radius: 12px; border: 1px solid var(--border);">
                        <p style="color: var(--text-muted);">No orders ready for packing</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(order => {
                const customer = customers.find(c => c.id === order.customer_id) || {};
                const customerName = customer.company || customer.name || 'Unknown';
                const orderBoxes = order.orderBoxes || 0;
                const extraBoxes = order.extraBoxes || 0;
                const totalBoxes = order.totalBoxes || 0;
                const remainingForOrder = Math.max(0, totalBoxes - orderBoxes);
                const isLocked = order.isLocked || false;
                const viewerMode = isViewer();
                
                // Determine status based ONLY on order fulfillment
                let statusClass = 'status-pending';
                let statusText = 'Pending';
                
                if (isLocked) {
                    statusClass = 'status-locked';
                    statusText = 'Locked';
                } else if (order.isFullyPacked) {
                    statusClass = 'status-completed';
                    statusText = 'Completed';
                } else if (orderBoxes > 0) {
                    statusClass = 'status-progress';
                    statusText = 'In Progress';
                }
                
                return `
                    <div class="order-card ${isLocked ? 'locked' : ''} ${viewerMode ? 'viewer-mode' : ''}" 
                         onclick="${!isLocked && !viewerMode ? `openOrderModal('${order.id}')` : ''}">
                        <div class="order-header">
                            <span class="order-number">
                                ${order.order_number || 'Unknown'}
                                ${isLocked ? '<span class="lock-badge">🔒 Locked</span>' : ''}
                                ${viewerMode ? '<span class="view-only-badge">👁️ View Only</span>' : ''}
                            </span>
                            <span class="order-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="customer-name">
                            <span>👤</span> ${customerName}
                        </div>
                        <div class="progress-container">
                            <div class="progress-header">
                                <span>Order Fulfillment</span>
                                <span>${orderBoxes}/${totalBoxes} boxes</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${Math.min(order.progress, 100)}%"></div>
                            </div>
                        </div>
                        <div class="order-footer">
                            <span class="order-total">📦 Total: ${totalBoxes}</span>
                            <span class="order-packed">✅ Packed: ${orderBoxes}</span>
                            ${extraBoxes > 0 ? 
                                `<span class="order-extra">✨ Extra: ${extraBoxes}</span>` : 
                                ''}
                            ${!order.isFullyPacked && !isLocked ? 
                                `<span class="order-left">⏳ Left: ${remainingForOrder}</span>` : 
                                ''}
                        </div>
                        ${extraBoxes > 0 ? 
                            `<div style="margin-top: 0.5rem; font-size: 0.7rem; color: var(--purple); text-align: right;">
                                +${extraBoxes} extra boxes in Finished Goods
                            </div>` : 
                            ''}
                        
                        ${isAdmin() && !viewerMode ? `
                            <div class="admin-controls">
                                ${isLocked ? 
                                    `<button class="unlock-btn" onclick="event.stopPropagation(); toggleOrderLock('${order.id}', true)">
                                        <span>🔓</span> Unlock Order
                                    </button>` : 
                                    `<button class="lock-btn" onclick="event.stopPropagation(); toggleOrderLock('${order.id}', false)">
                                        <span>🔒</span> Lock Order
                                    </button>`
                                }
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        // ==================== MODAL FUNCTIONS ====================
        
        window.openOrderModal = async function(orderId) {
            // Viewers cannot open modal with editing capabilities
            if (isViewer()) {
                showToast('Viewers cannot view order details', 'info');
                return;
            }
            
            try {
                const orderSnap = await db.collection(COLLECTIONS.ORDERS).doc(orderId).get();
                selectedOrder = { id: orderSnap.id, ...orderSnap.data() };
                selectedBatch = null;
                
                // Check if order is locked
                if (selectedOrder.isLocked && !isAdmin()) {
                    showToast('This order is locked. Only Admin can modify.', 'error');
                    return;
                }
                
                document.getElementById('modalOrderNumber').innerHTML = `
                    ${selectedOrder.order_number || 'Unknown'}
                    ${selectedOrder.isLocked ? '<span class="modal-lock-badge">🔒 Locked</span>' : ''}
                `;
                
                const orderPackings = allPackings.filter(p => p.order_id === selectedOrder.id);
                await renderOrderDetails(selectedOrder, orderPackings);
                
                document.getElementById('orderModal').classList.add('active');
                
            } catch (error) {
                console.error("Error opening order:", error);
                showToast("Error loading order details", "error");
            }
        };
        
        window.closeOrderModal = function() {
            document.getElementById('orderModal').classList.remove('active');
            selectedBatch = null;
        };
        
        async function renderOrderDetails(order, packings = []) {
            const container = document.getElementById('modalBody');
            const isLocked = order.isLocked || false;
            const canEdit = (!isLocked || isAdmin()) && !isViewer();
            const viewerMode = isViewer();
            
            const customer = customers.find(c => c.id === order.customer_id) || {};
            
            // Calculate totals - SEPARATE order boxes from extra boxes
            let totalOrderBoxes = 0;
            let totalPackedOrderBoxes = 0;
            let totalExtraBoxes = 0;
            
            if (order.lines && Array.isArray(order.lines)) {
                totalOrderBoxes = order.lines.reduce((sum, line) => sum + (line.boxes || line.qty || 0), 0);
            }
            
            packings.forEach(p => {
                if (p.type === 'extra' || p.moved_to_finished_goods) {
                    totalExtraBoxes += p.packed_boxes || 0;
                } else {
                    totalPackedOrderBoxes += p.packed_boxes || 0;
                }
            });
            
            const remainingForOrder = Math.max(0, totalOrderBoxes - totalPackedOrderBoxes);
            const isOrderCompleted = totalPackedOrderBoxes >= totalOrderBoxes && totalOrderBoxes > 0;
            
            let html = `
                ${viewerMode ? `
                    <div class="view-only-overlay">
                        <span class="view-only-icon">👁️</span>
                        <span class="view-only-text">You are in view-only mode. You can see details but cannot pack.</span>
                    </div>
                ` : ''}
                ${isLocked && !isAdmin() && !viewerMode ? `
                    <div class="view-only-overlay" style="border-color: var(--danger); color: var(--danger);">
                        <span class="view-only-icon">🔒</span>
                        <span class="view-only-text">This order is locked by Admin. View only mode.</span>
                    </div>
                ` : ''}
                
                <!-- Order Summary -->
                <div class="order-summary">
                    <div class="summary-grid">
                        <div class="summary-item">
                            <span class="summary-label">Customer</span>
                            <span class="summary-value">${customer.company || customer.name || 'Unknown'}</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Order Date</span>
                            <span class="summary-value">${order.order_date || 'N/A'}</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Order Boxes</span>
                            <span class="summary-value highlight">${totalOrderBoxes}</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Packed for Order</span>
                            <span class="summary-value success">${totalPackedOrderBoxes}</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Extra Boxes</span>
                            <span class="summary-value purple">${totalExtraBoxes}</span>
                        </div>
                    </div>
                    ${isOrderCompleted ? 
                        `<div class="completion-badge completed">✓ Order Quantity Fully Packed</div>` : 
                        `<div class="completion-badge pending">⏳ Remaining for Order: ${remainingForOrder} boxes</div>`
                    }
                    ${isLocked ? `
                        <div style="margin-top: 1rem; padding: 0.5rem; background: #fee2e2; border-radius: 6px; color: var(--danger); text-align: center;">
                            🔒 This order is locked. ${isAdmin() ? 'Admin can modify.' : 'View only.'}
                        </div>
                    ` : ''}
                </div>
                
                <div class="items-container">
            `;
            
            if (!order.lines || order.lines.length === 0) {
                html += '<p style="text-align: center; padding: 2rem;">No items in this order</p>';
            } else {
                order.lines.forEach((line) => {
                    const linePackings = packings.filter(p => p.order_line_id === line.id);
                    const lineOrdered = line.boxes || line.qty || 0;
                    
                    let linePackedOrder = 0;
                    let linePackedExtra = 0;
                    
                    linePackings.forEach(p => {
                        if (p.type === 'extra' || p.moved_to_finished_goods) {
                            linePackedExtra += p.packed_boxes || 0;
                        } else {
                            linePackedOrder += p.packed_boxes || 0;
                        }
                    });
                    
                    const lineRemaining = Math.max(0, lineOrdered - linePackedOrder);
                    const isLineCompleted = linePackedOrder >= lineOrdered && lineOrdered > 0;
                    
                    const availableStock = bulkInventory.filter(item => 
                        item.technicalName === line.technical_name && 
                        (item.quantity || 0) > 0
                    );
                    
                    const totalAvailable = availableStock.reduce((sum, item) => sum + (item.quantity || 0), 0);
                    
                    const sizeML = convertSizeToML(line.size);
                    const sizeDisplay = sizeML >= 1000 ? (sizeML/1000) + ' Ltr' : sizeML + ' ML';
                    
                    html += `
                        <div class="item-card" id="item-${line.id}">
                            <div class="item-header">
                                <div class="item-title">
                                    <span class="item-name">${line.technical_name || 'Unknown Technical'}</span>
                                    <span class="item-tag">${line.brand_name || 'N/A'}</span>
                                    <span class="item-tag primary">${sizeDisplay}</span>
                                    <span class="item-tag">${line.pcs_per_box || '0'} PCS/Box</span>
                                </div>
                                <div class="item-progress">
                                    <span>Order: ${linePackedOrder}/${lineOrdered}</span>
                                    ${linePackedExtra > 0 ? `<span class="extra-badge">Extra: ${linePackedExtra}</span>` : ''}
                                </div>
                            </div>
                            
                            <div class="item-content">
                                <!-- Data Grid -->
                                <div class="data-grid">
                                    <div class="data-cell">
                                        <span class="data-label">Ordered Boxes</span>
                                        <span class="data-value">${lineOrdered}</span>
                                    </div>
                                    <div class="data-cell">
                                        <span class="data-label">Packed for Order</span>
                                        <span class="data-value success">${linePackedOrder}</span>
                                    </div>
                                    <div class="data-cell">
                                        <span class="data-label">Extra Boxes</span>
                                        <span class="data-value purple">${linePackedExtra}</span>
                                    </div>
                                    <div class="data-cell">
                                        <span class="data-label">PCS per Box</span>
                                        <span class="data-value">${line.pcs_per_box || 0}</span>
                                    </div>
                                    <div class="data-cell">
                                        <span class="data-label">Size per PCS</span>
                                        <span class="data-value">${sizeDisplay}</span>
                                    </div>
                                </div>
                                
                                <!-- Stock Status -->
                                <div class="stock-status">
                                    <span>Available Formulation Stock</span>
                                    <strong>${totalAvailable.toFixed(2)} L</strong>
                                </div>
                    `;
                    
                    // Packing History
                    if (linePackings.length > 0) {
                        html += `
                            <div class="history-section">
                                <div class="history-title">
                                    <span>📜</span> Packing History
                                </div>
                                <div class="history-list">
                                    ${linePackings.map(p => `
                                        <div class="history-item">
                                            <div class="history-info">
                                                <span class="history-boxes">${p.packed_boxes} boxes</span>
                                                <span class="history-batch">Batch: ${p.batch_number || 'N/A'}</span>
                                                ${p.type === 'extra' || p.moved_to_finished_goods ? 
                                                    '<span class="history-extra">Extra → Finished Goods</span>' : 
                                                    '<span class="history-order">Order Fulfillment</span>'
                                                }
                                            </div>
                                            <div class="history-date">${p.packed_date || ''}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    // Available Batches - Show but disable if can't edit
                    if (availableStock.length > 0) {
                        if (canEdit) {
                            html += `
                                <div class="history-section">
                                    <div class="history-title">
                                        <span>🏷️</span> Available Batches (Click to Auto-fill)
                                    </div>
                                    <div class="batch-grid">
                                        ${availableStock.map(item => `
                                            <div class="batch-card ${selectedBatch?.id === item.id && selectedBatch?.lineId === line.id ? 'selected' : ''}" 
                                                 data-id="${item.id}"
                                                 data-line="${line.id}"
                                                 onclick="${canEdit ? `selectBatch('${item.id}', '${item.batchNumber}', '${item.mfgDate || ''}', '${item.expDate || ''}', ${item.quantity || 0}, '${line.id}')` : ''}">
                                                <div class="batch-number">${item.batchNumber}</div>
                                                <div class="batch-detail">MFG: ${item.mfgDate || 'N/A'}</div>
                                                <div class="batch-detail">EXP: ${item.expDate || 'N/A'}</div>
                                                <div class="batch-qty">Available: <span>${(item.quantity || 0).toFixed(2)} L</span></div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="history-section">
                                    <div class="history-title">
                                        <span>🏷️</span> Available Batches
                                    </div>
                                    <div class="batch-grid">
                                        ${availableStock.map(item => `
                                            <div class="batch-card disabled">
                                                <div class="batch-number">${item.batchNumber}</div>
                                                <div class="batch-detail">MFG: ${item.mfgDate || 'N/A'}</div>
                                                <div class="batch-detail">EXP: ${item.expDate || 'N/A'}</div>
                                                <div class="batch-qty">Available: <span>${(item.quantity || 0).toFixed(2)} L</span></div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }
                    }
                    
                    // Packing Form - Show only if can edit
                    if (availableStock.length > 0) {
                        if (canEdit) {
                            html += `
                                <div class="packing-form">
                                    <div class="form-title">
                                        <span>📦</span> Pack Boxes
                                    </div>
                                    <div class="form-grid">
                                        <div class="form-field">
                                            <label>Boxes to Pack</label>
                                            <input type="number" class="form-control" id="qty-${line.id}" 
                                                   min="1" value="1"
                                                   onchange="calculateConsumedQty('${line.id}')"
                                                   ${!canEdit ? 'disabled' : ''}>
                                        </div>
                                        <div class="form-field">
                                            <label>Batch Number</label>
                                            <input type="text" class="form-control" id="batch-${line.id}" 
                                                   placeholder="Click batch to select" readonly>
                                        </div>
                                        <div class="form-field">
                                            <label>MFG Date</label>
                                            <input type="date" class="form-control" id="mfg-${line.id}" readonly>
                                        </div>
                                        <div class="form-field">
                                            <label>EXP Date</label>
                                            <input type="date" class="form-control" id="exp-${line.id}" readonly>
                                        </div>
                                        <div class="form-field">
                                            <label>Stock to Use (L)</label>
                                            <input type="number" class="form-control calculated-field" id="stock-${line.id}" readonly>
                                        </div>
                                        <button class="btn-pack" onclick="packBatch('${order.id}', '${line.id}')" ${!canEdit ? 'disabled' : ''}>
                                            <span>📦</span> Pack
                                        </button>
                                    </div>
                                    <div class="calculation-hint" id="calculation-${line.id}">
                                        Enter number of boxes to calculate required stock
                                    </div>
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="packing-form disabled">
                                    <div class="form-title">
                                        <span>📦</span> Packing ${viewerMode ? 'Disabled for Viewers' : 'Disabled'}
                                    </div>
                                    <div style="text-align: center; padding: 1rem; color: var(--text-muted);">
                                        ${viewerMode ? 'Viewers cannot pack orders.' : 'This order is locked. Packing not allowed.'}
                                    </div>
                                </div>
                            `;
                        }
                    } else {
                        html += `
                            <div style="background: #fee2e2; border: 1px solid var(--danger); border-radius: 8px; padding: 1rem; color: var(--danger); text-align: center;">
                                ⚠️ No stock available for this product
                            </div>
                        `;
                    }
                    
                    html += '</div></div>';
                });
            }
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // ==================== BATCH SELECTION ====================
        
        window.selectBatch = function(batchId, batchNumber, mfgDate, expDate, availableQty, lineId) {
            // Viewers cannot select batches
            if (isViewer()) {
                showToast('Viewers cannot select batches', 'error');
                return;
            }
            
            // Check if order is locked and user is not admin
            if (selectedOrder?.isLocked && !isAdmin()) {
                showToast('This order is locked. Cannot select batch.', 'error');
                return;
            }
            
            selectedBatch = {
                id: batchId,
                batchNumber: batchNumber,
                mfgDate: mfgDate,
                expDate: expDate,
                availableQty: availableQty,
                lineId: lineId
            };
            
            document.getElementById(`batch-${lineId}`).value = batchNumber;
            document.getElementById(`mfg-${lineId}`).value = mfgDate;
            document.getElementById(`exp-${lineId}`).value = expDate;
            
            document.querySelectorAll(`.batch-card[data-line="${lineId}"]`).forEach(card => {
                card.classList.remove('selected');
            });
            const selectedCard = document.querySelector(`.batch-card[data-id="${batchId}"][data-line="${lineId}"]`);
            if (selectedCard) {
                selectedCard.classList.add('selected');
            }
            
            calculateConsumedQty(lineId);
        };
        
        // ==================== CALCULATION ====================
        
        window.calculateConsumedQty = function(lineId) {
            // Viewers cannot calculate
            if (isViewer()) {
                return;
            }
            
            // Check if order is locked and user is not admin
            if (selectedOrder?.isLocked && !isAdmin()) {
                return;
            }
            
            const boxesInput = document.getElementById(`qty-${lineId}`);
            const stockInput = document.getElementById(`stock-${lineId}`);
            const calculationDisplay = document.getElementById(`calculation-${lineId}`);
            
            const boxesToPack = parseInt(boxesInput.value) || 0;
            
            if (boxesToPack > 0 && selectedOrder && selectedBatch) {
                const line = selectedOrder?.lines?.find(l => l.id === lineId);
                if (!line) return;
                
                const pcsPerBox = parseInt(line.pcs_per_box) || 0;
                const sizeML = convertSizeToML(line.size);
                
                if (pcsPerBox > 0 && sizeML > 0) {
                    const totalML = boxesToPack * pcsPerBox * sizeML;
                    const totalLiters = totalML / 1000;
                    
                    stockInput.value = totalLiters.toFixed(2);
                    
                    const linePackings = allPackings.filter(p => p.order_line_id === line.id);
                    let linePackedOrder = 0;
                    linePackings.forEach(p => {
                        if (!(p.type === 'extra' || p.moved_to_finished_goods)) {
                            linePackedOrder += p.packed_boxes || 0;
                        }
                    });
                    
                    const lineOrdered = line.boxes || line.qty || 0;
                    const remainingForOrder = Math.max(0, lineOrdered - linePackedOrder);
                    
                    let calculationText = `Required: ${boxesToPack} boxes × ${pcsPerBox} PCS × ${sizeML}ML = ${totalML}ML = ${totalLiters.toFixed(2)}L`;
                    
                    if (boxesToPack > remainingForOrder) {
                        const extraBoxes = boxesToPack - remainingForOrder;
                        calculationText += `<br><span style="color: var(--purple);">⚠️ ${extraBoxes} extra box(es) will be sent to Finished Goods</span>`;
                    }
                    
                    if (calculationDisplay) {
                        calculationDisplay.innerHTML = calculationText;
                    }
                    
                    if (selectedBatch && totalLiters > selectedBatch.availableQty) {
                        stockInput.style.borderColor = 'var(--danger)';
                        showToast(`⚠️ Need ${totalLiters.toFixed(2)}L but only ${selectedBatch.availableQty.toFixed(2)}L available`, 'error');
                    } else {
                        stockInput.style.borderColor = 'var(--primary)';
                    }
                }
            }
        };
        
        // ==================== PACK BATCH ====================
        
        window.packBatch = async function(orderId, lineId) {
            // Viewers cannot pack
            if (isViewer()) {
                showToast('Viewers cannot pack orders', 'error');
                return;
            }
            
            // Check if order is locked
            if (selectedOrder?.isLocked && !isAdmin()) {
                showToast('This order is locked. Only Admin can pack.', 'error');
                return;
            }
            
            const qtyInput = document.getElementById(`qty-${lineId}`);
            const batchInput = document.getElementById(`batch-${lineId}`);
            const mfgInput = document.getElementById(`mfg-${lineId}`);
            const expInput = document.getElementById(`exp-${lineId}`);
            const stockInput = document.getElementById(`stock-${lineId}`);
            
            if (!qtyInput || !batchInput || !mfgInput || !expInput || !stockInput) {
                showToast('Form error', 'error');
                return;
            }
            
            const boxesToPack = parseInt(qtyInput.value);
            const batchNumber = batchInput.value;
            const mfgDate = mfgInput.value;
            const expDate = expInput.value;
            const stockUsed = parseFloat(stockInput.value);
            
            if (isNaN(boxesToPack) || boxesToPack < 1) {
                showToast('Enter valid boxes to pack', 'error');
                return;
            }
            
            if (!batchNumber) {
                showToast('Select a batch first', 'error');
                return;
            }
            
            if (isNaN(stockUsed) || stockUsed <= 0) {
                showToast('Invalid stock calculation', 'error');
                return;
            }
            
            if (!mfgDate || !expDate) {
                showToast('Manufacturing and expiry dates are required', 'error');
                return;
            }
            
            if (!selectedOrder || !selectedBatch) {
                showToast('Please select a batch', 'error');
                return;
            }
            
            const line = selectedOrder.lines.find(l => l.id === lineId);
            if (!line) return;
            
            if (stockUsed > selectedBatch.availableQty) {
                showToast(`Insufficient stock! Only ${selectedBatch.availableQty.toFixed(2)}L available`, 'error');
                return;
            }
            
            try {
                const timestamp = new Date().toISOString();
                const user = getCurrentUser();
                
                // Calculate order vs extra
                const linePackings = allPackings.filter(p => p.order_line_id === line.id);
                let linePackedOrder = 0;
                linePackings.forEach(p => {
                    if (!(p.type === 'extra' || p.moved_to_finished_goods)) {
                        linePackedOrder += p.packed_boxes || 0;
                    }
                });
                
                const lineOrdered = line.boxes || line.qty || 0;
                const remainingForOrder = Math.max(0, lineOrdered - linePackedOrder);
                
                let orderBoxes = 0;  // Boxes that fulfill the order
                let extraBoxes = 0;   // Extra boxes for finished goods
                
                if (boxesToPack <= remainingForOrder) {
                    // All boxes go to order fulfillment
                    orderBoxes = boxesToPack;
                } else {
                    // Some go to order, rest are extra
                    orderBoxes = remainingForOrder;
                    extraBoxes = boxesToPack - remainingForOrder;
                }
                
                // Reduce stock from bulk inventory
                const batchRef = db.collection(COLLECTIONS.BULK_INVENTORY).doc(selectedBatch.id);
                const newQuantity = selectedBatch.availableQty - stockUsed;
                
                await batchRef.update({
                    quantity: newQuantity,
                    updatedAt: timestamp
                });
                
                // Create packing record for order boxes (fulfillment)
                if (orderBoxes > 0) {
                    const orderStockUsed = (orderBoxes / boxesToPack) * stockUsed;
                    
                    const packingRecord = {
                        id: 'PACK-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4) + '-ORDER',
                        order_id: orderId,
                        order_line_id: lineId,
                        packed_boxes: orderBoxes,
                        batch_number: batchNumber,
                        batch_id: selectedBatch.id,
                        mfg_date: mfgDate,
                        exp_date: expDate,
                        stock_used: orderStockUsed,
                        technical_name: line.technical_name,
                        brand_name: line.brand_name,
                        pcs_per_box: line.pcs_per_box || 0,
                        size: line.size || 'N/A',
                        packed_by: user?.name || 'Packing Manager',
                        packed_date: new Date().toISOString().split('T')[0],
                        created_at: timestamp,
                        type: 'order'  // Mark as order fulfillment
                    };
                    
                    await db.collection(COLLECTIONS.PACKING).doc(packingRecord.id).set(packingRecord);
                    
                    // Create usage record
                    const usageRecord = {
                        id: 'USE-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
                        batchId: selectedBatch.id,
                        batchNumber: batchNumber,
                        technicalName: line.technical_name,
                        brandName: line.brand_name,
                        quantity: orderStockUsed,
                        orderId: orderId,
                        orderNumber: selectedOrder.order_number,
                        orderLineId: lineId,
                        productPacked: `${line.size} - ${line.brand_name}`,
                        packedBoxes: orderBoxes,
                        remarks: `Packed ${orderBoxes} boxes for order`,
                        usedBy: user?.name || 'Packing Manager',
                        usedAt: timestamp
                    };
                    
                    await db.collection(COLLECTIONS.BULK_USAGE).doc(usageRecord.id).set(usageRecord);
                }
                
                // Handle extra boxes - Add to Finished Goods
                if (extraBoxes > 0) {
                    const extraStockUsed = (extraBoxes / boxesToPack) * stockUsed;
                    
                    await addToFinishedGoods(selectedBatch, line, extraBoxes, extraStockUsed, selectedOrder, true);
                    
                    // Create packing record for extra boxes
                    const extraPackingRecord = {
                        id: 'PACK-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4) + '-EXTRA',
                        order_id: orderId,
                        order_line_id: lineId,
                        packed_boxes: extraBoxes,
                        batch_number: batchNumber,
                        batch_id: selectedBatch.id,
                        mfg_date: mfgDate,
                        exp_date: expDate,
                        stock_used: extraStockUsed,
                        technical_name: line.technical_name,
                        brand_name: line.brand_name,
                        pcs_per_box: line.pcs_per_box || 0,
                        size: line.size || 'N/A',
                        packed_by: user?.name || 'Packing Manager',
                        packed_date: new Date().toISOString().split('T')[0],
                        created_at: timestamp,
                        type: 'extra',  // Mark as extra
                        moved_to_finished_goods: true
                    };
                    
                    await db.collection(COLLECTIONS.PACKING).doc(extraPackingRecord.id).set(extraPackingRecord);
                }
                
                // Show success message
                let message = '';
                if (orderBoxes > 0 && extraBoxes > 0) {
                    message = `✅ Packed ${orderBoxes} boxes for order, ${extraBoxes} extra boxes moved to Finished Goods`;
                    showToast(message, 'purple');
                } else if (orderBoxes > 0) {
                    message = `✅ Packed ${orderBoxes} boxes for order`;
                    showToast(message, 'success');
                } else if (extraBoxes > 0) {
                    message = `✅ Added ${extraBoxes} extra boxes to Finished Goods`;
                    showToast(message, 'purple');
                }
                
                selectedBatch = null;
                await loadBulkInventory();
                await loadData();
                
                // Refresh the modal with updated data
                const orderPackings = allPackings.filter(p => p.order_id === selectedOrder.id);
                await renderOrderDetails(selectedOrder, orderPackings);
                
            } catch (error) {
                console.error("Error:", error);
                showToast('Error: ' + error.message, 'error');
            }
        };
        
        // ==================== INITIALIZATION ====================
        
        if (!checkPageAccess()) {
            // Redirect
        } else {
            updateNavigation();
            
            document.getElementById('logoutBtn').addEventListener('click', function(e) {
                e.preventDefault();
                logout();
            });
            
            loadData();
            
            setInterval(loadData, 30000);
            setInterval(loadBulkInventory, 30000);
        }
        
        // Close modal when clicking outside
        window.addEventListener('click', (event) => {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) {
                closeOrderModal();
            }
        });
    </script>
</body>
</html>
