<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyrone Agrochemicals - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --info: #0891b2;
            --purple: #7c3aed;
            --purple-dark: #6d28d9;
            --teal: #14b8a6;
            --teal-dark: #0d9488;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a5f23 0%, #2d8c3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
        }

        .login-card {
            background: var(--card);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2), 0 10px 10px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #1a5f23;
            margin-bottom: 8px;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #1a5f23;
            box-shadow: 0 0 0 3px rgba(26, 95, 35, 0.1);
        }

        .password-input {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #1a5f23;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #2d8c3a;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid var(--danger);
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d1fae5;
            color: var(--success);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid var(--success);
        }

        .success-message.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>🌿 TYRONE</h1>
                <p>Agrochemicals Private Limited</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off" autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-input">
                    <input type="password" id="password" placeholder="Enter your password">
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <button class="btn" id="loginBtn" onclick="login()">
                <span class="btn-content">
                    <span>Sign In</span>
                </span>
            </button>

            <div class="footer">
                © 2024 Tyrone Agrochemicals. All rights reserved.
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBowsklKCH-C5uVv1laoqE9joupuGeqVdk",
            authDomain: "tyrone-oms.firebaseapp.com",
            projectId: "tyrone-oms",
            storageBucket: "tyrone-oms.firebasestorage.app",
            messagingSenderId: "494239566320",
            appId: "1:494239566320:web:9f44f2da4c8f00f7e9b535"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const USERS_COLLECTION = 'users';

        // ==================== GLOBAL VARIABLES ====================
        let isLoggingIn = false;

        // ==================== HELPER FUNCTIONS ====================
        
        // Toggle password visibility
        window.togglePassword = function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        };

        // Show error message
        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.classList.add('show');
            
            setTimeout(() => {
                errorElement.classList.remove('show');
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successElement = document.getElementById('successMessage');
            successElement.textContent = message;
            successElement.classList.add('show');
            
            setTimeout(() => {
                successElement.classList.remove('show');
            }, 3000);
        }

        // Set loading state
        function setLoading(isLoading) {
            const loginBtn = document.getElementById('loginBtn');
            const btnContent = loginBtn.querySelector('.btn-content');
            
            if (isLoading) {
                loginBtn.disabled = true;
                btnContent.innerHTML = '<span class="loading-spinner"></span><span>Signing in...</span>';
            } else {
                loginBtn.disabled = false;
                btnContent.innerHTML = '<span>Sign In</span>';
            }
        }

        // ==================== CREATE DEFAULT ADMIN IF NOT EXISTS ====================
        async function ensureAdminExists() {
            try {
                const adminSnap = await db.collection(USERS_COLLECTION)
                    .where('username', '==', 'admin')
                    .get();

                if (adminSnap.empty) {
                    console.log("Creating default admin user...");
                    
                    const adminUser = {
                        username: 'admin',
                        password: 'admin123',
                        name: 'Administrator',
                        role: 'admin',
                        status: 'active',
                        permissions: {
                            canViewDashboard: true,
                            canAccessMasterData: true,
                            canAccessBottleInventory: true,
                            canCreateOrder: true,
                            canAccessPacking: true,
                            canAccessBulkInventory: true,
                            canAccessFinishedGoods: true,
                            canAccessDispatch: true,
                            canViewOrders: true,
                            canAccessFormulation: true,
                            canAccessFormulationInventory: true,
                            canAccessReports: true,
                            canEditOrders: true,
                            canManageUsers: true
                        },
                        createdAt: new Date().toISOString()
                    };
                    
                    await db.collection(USERS_COLLECTION).add(adminUser);
                    console.log("Default admin user created");
                }
            } catch (error) {
                console.error("Error creating admin user:", error);
            }
        }

        // ==================== LOGIN FUNCTION ====================
        window.login = async function() {
            if (isLoggingIn) return;
            
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            setLoading(true);
            isLoggingIn = true;

            try {
                // Ensure admin exists (for first time setup)
                await ensureAdminExists();

                const usersSnap = await db.collection(USERS_COLLECTION)
                    .where('username', '==', username)
                    .get();

                if (usersSnap.empty) {
                    showError('Invalid username or password');
                    setLoading(false);
                    isLoggingIn = false;
                    return;
                }

                const userDoc = usersSnap.docs[0];
                const userData = userDoc.data();

                if (userData.password !== password) {
                    showError('Invalid username or password');
                    setLoading(false);
                    isLoggingIn = false;
                    return;
                }

                if (userData.status !== 'active') {
                    showError('Your account is deactivated. Please contact administrator.');
                    setLoading(false);
                    isLoggingIn = false;
                    return;
                }

                await db.collection(USERS_COLLECTION).doc(userDoc.id).update({
                    lastLogin: new Date().toISOString()
                });

                const userSession = {
                    id: userDoc.id,
                    username: userData.username,
                    name: userData.name,
                    role: userData.role,
                    permissions: userData.permissions || {},
                    loginTime: new Date().toISOString()
                };

                localStorage.setItem('currentUser', JSON.stringify(userSession));
                sessionStorage.setItem('currentUser', JSON.stringify(userSession));

                showSuccess('Login successful! Redirecting...');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error("Login error:", error);
                showError('Login failed. Please try again.');
                setLoading(false);
                isLoggingIn = false;
            }
        };

        // ==================== CHECK EXISTING SESSION ====================
        (function checkExistingSession() {
            const session = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
            if (session) {
                try {
                    const user = JSON.parse(session);
                    window.location.href = 'dashboard.html';
                } catch (e) {
                    localStorage.removeItem('currentUser');
                    sessionStorage.removeItem('currentUser');
                }
            }
        })();

        // ==================== EVENT LISTENERS ====================
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });

        window.addEventListener('load', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
